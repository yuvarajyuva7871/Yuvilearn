<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Yuvilearn AI</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background-color: #0f172a;
      background-image: none; /* Keep dashboard clean */
    }

    /* Sidebar */
    aside {
      width: 260px;
      background: rgba(15, 23, 42, 0.95);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      z-index: 20;
    }

    .logo-container {
      margin-bottom: 2.5rem;
    }

    .nav-items {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex-grow: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      color: var(--text-muted);
      transition: all 0.2s ease;
      font-weight: 500;
      cursor: pointer;
    }

    .nav-item:hover, .nav-item.active {
      background: var(--glass-bg);
      color: var(--text-main);
    }
    
    .nav-item.active {
      border-left: 3px solid var(--primary);
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--glass-border);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    /* Main Chat Interface */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chat-header {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .subject-selector {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
    }

    .subject-selector option {
      background: var(--bg-color);
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      scroll-behavior: smooth;
    }

    /* Hide scrollbar for a cleaner look */
    .chat-container::-webkit-scrollbar {
      width: 6px;
    }
    .chat-container::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 10px;
    }

    .message {
      max-width: 80%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
    }

    .message.ai {
      align-self: flex-start;
    }

    .bubble {
      padding: 1rem 1.25rem;
      border-radius: 16px;
      line-height: 1.5;
    }

    .message.user .bubble {
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 4px;
    }

    .input-container {
      padding: 1.5rem 2rem;
      background: var(--bg-color);
      border-top: 1px solid var(--glass-border);
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 0.5rem;
      transition: border-color 0.3s;
    }

    .input-box:focus-within {
      border-color: var(--primary);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      padding: 0.75rem;
      resize: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      min-height: 24px;
      max-height: 150px;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: var(--primary);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 0.5rem;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--primary-hover);
      transform: scale(1.05);
    }

    .attach-btn {
      background: transparent;
      color: var(--text-muted);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .attach-btn:hover {
      background: var(--glass-bg);
      color: white;
    }

    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      opacity: 0.7;
    }
    
    .loading-dots {
      display: flex;
      gap: 4px;
      padding: 5px 0;
    }
    
    .dot {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

  </style>
</head>
<body>

  <aside>
    <div class="logo-container">
      <a href="index.html" class="logo">Yuvilearn</a>
    </div>

    <div class="nav-items">
      <div class="nav-item active">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        Doubt Solver
      </div>
      <div class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        Study Planner
      </div>
      <div class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"></path><line x1="16" y1="8" x2="2" y2="22"></line><line x1="17.5" y1="15" x2="9" y2="15"></line></svg>
        Mock Tests
      </div>
    </div>

    <div class="user-profile">
      <div class="avatar">S</div>
      <div>
        <div style="font-size: 0.9rem; font-weight: 600;">Student</div>
        <div style="font-size: 0.75rem; color: var(--text-muted);">Grade 10 Foundation</div>
      </div>
    </div>
  </aside>

  <main>
    <header class="chat-header">
      <div>
        <h2 style="font-size: 1.25rem;">AI doubt Solver</h2>
      </div>
      <select class="subject-selector" id="subjectSelector">
        <option value="physics">Physics</option>
        <option value="chemistry">Chemistry</option>
        <option value="biology">Biology</option>
      </select>
    </header>

    <div class="chat-container" id="chatbox">
      <div class="welcome-screen" id="welcomeScreen">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary); margin-bottom: 1rem;"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        <h3>What are you stuck on today?</h3>
        <p style="color: var(--text-muted); margin-top: 0.5rem; max-width: 400px;">
          Type your Physics, Chemistry, or Biology doubt below. You can paste an image or just describe the problem.
        </p>
      </div>
    </div>

    <div class="input-container">
      <div class="input-box">
        <button class="attach-btn" title="Upload Image">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </button>
        <textarea 
          id="userInput" 
          rows="1" 
          placeholder="e.g. Find the acceleration of a 2kg block pulled with a 10N force..."
          oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
          onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"
        ></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
