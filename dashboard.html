<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuvilearn Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: linear-gradient(90deg, #22c55e, #06b6d4);
    padding: 15px;
    text-align: center;
    color: black;
}

.container {
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin: 15px 0;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

.logout {
    background: red;
}
</style>
</head>

<body>

<header>
    <h1>🎓 Yuvilearn Dashboard</h1>
</header>

<div class="container">

    <!-- Student Info -->
    <div class="card">
        <h2 id="welcome">Loading...</h2>
        <p id="class"></p>
        <p id="goal"></p>
    </div>

    <!-- Actions -->
    <div class="card">
        <h3>📚 Learning Actions</h3>
        <button onclick="startLearning()">Start Learning</button>
        <button onclick="takeTest()">Take Test</button>
        <button onclick="askAI()">Ask AI Doubt</button>
    </div>

    <!-- Progress -->
    <div class="card">
        <h3>📊 Progress</h3>
        <p>Coming soon: Track your improvement</p>
    </div>

    <!-- Logout -->
    <div class="card">
        <button class="logout" onclick="logout()">Logout</button>
    </div>

</div>

<script type="module">

import { auth } from './firebase.js';
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔹 AUTH CHECK (REAL FIX)
onAuthStateChanged(auth, (user) => {

    if (!user) {
        // ❌ Not logged in
        window.location.href = "login.html";
        return;
    }

    // ✅ Logged in user
    const name = localStorage.getItem("name") || user.displayName || "Student";
    const studentClass = localStorage.getItem("class") || "Not set";
    const goal = localStorage.getItem("goal") || "NEET";

    document.getElementById("welcome").innerText = "Welcome " + name + " 👋";
    document.getElementById("class").innerText = "Class: " + studentClass;
    document.getElementById("goal").innerText = "Goal: " + goal;
});

// 🔹 LOGOUT (PROPER WAY)
async function logout() {
    await signOut(auth);
    localStorage.clear();
    window.location.href = "login.html";
}

window.logout = logout;

// 🔹 FEATURES (PLACEHOLDER)
function startLearning() {
    alert("Coming soon: Learning modules");
}

function takeTest() {
    alert("Coming soon: NEET tests");
}

function askAI() {
    alert("Coming soon: AI doubt solver");
}

window.startLearning = startLearning;
window.takeTest = takeTest;
window.askAI = askAI;

</script>

</body>
</html>
