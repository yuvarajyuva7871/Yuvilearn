<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuvilearn Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

/* Header */
header {
    background: linear-gradient(90deg, #22c55e, #06b6d4);
    padding: 15px;
    text-align: center;
    color: black;
    font-size: 20px;
    font-weight: bold;
}

/* Container */
.container {
    padding: 20px;
    max-width: 800px;
    margin: auto;
}

/* Cards */
.card {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 14px;
    margin: 20px 0;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

/* Buttons */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.logout {
    background: red;
}

/* Input */
textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
    font-size: 14px;
}

/* Chat box */
.chat-box {
    margin-top: 15px;
}

.message {
    padding: 10px;
    border-radius: 10px;
    margin: 8px 0;
    max-width: 80%;
}

.user {
    background: #22c55e;
    align-self: flex-end;
}

.ai {
    background: #1e293b;
}

</style>
</head>

<body>

<header>
    🎓 Yuvilearn Dashboard
</header>

<div class="container">

    <!-- Student Info -->
    <div class="card">
        <h2 id="welcome">Loading...</h2>
        <p id="class"></p>
        <p id="goal"></p>
    </div>

    <!-- Actions -->
    <div class="card">
        <h3>📚 Learning Actions</h3>
        <button onclick="startLearning()">Start Learning</button>
        <button onclick="takeTest()">Take Test</button>
    </div>

    <!-- AI DOUBT SOLVER -->
    <div class="card">
        <h3>🤖 Yuvi AI Doubt Solver</h3>

        <textarea id="question" placeholder="Ask your doubt..."></textarea>

        <br><br>

        <button onclick="askYuviAI()">Ask AI</button>

        <div class="chat-box" id="chat"></div>
    </div>

    <!-- Logout -->
    <div class="card">
        <button class="logout" onclick="logout()">Logout</button>
    </div>

</div>

<script type="module">

import { auth } from './firebase.js';
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔹 AUTH CHECK */
onAuthStateChanged(auth, (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    const name = localStorage.getItem("name") || user.displayName || "Student";
    const studentClass = localStorage.getItem("class") || "Not set";
    const goal = localStorage.getItem("goal") || "NEET";

    document.getElementById("welcome").innerText = "Welcome " + name + " 👋";
    document.getElementById("class").innerText = "Class: " + studentClass;
    document.getElementById("goal").innerText = "Goal: " + goal;
});

/* 🔹 LOGOUT */
async function logout() {
    await signOut(auth);
    localStorage.clear();
    window.location.href = "login.html";
}
window.logout = logout;

/* 🔹 AI FUNCTION */
async function askYuviAI() {

    const question = document.getElementById("question").value;
    const chat = document.getElementById("chat");

    if (!question) {
        alert("Enter your doubt");
        return;
    }

    // Add user message
    chat.innerHTML += `<div class="message user">🧑 ${question}</div>`;

    // Loading
    chat.innerHTML += `<div class="message ai">🤖 Thinking...</div>`;

    try {
        const response = await fetch("https://YOUR-RENDER-URL.onrender.com/ask-ai", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question })
        });

        const data = await response.json();

        // Remove last "thinking"
        chat.lastChild.remove();

        // Add AI answer
        chat.innerHTML += `<div class="message ai">🤖 ${data.answer}</div>`;

    } catch (error) {
        chat.innerHTML += `<div class="message ai">⚠️ Server error</div>`;
    }

    document.getElementById("question").value = "";
}

window.askYuviAI = askYuviAI;

/* 🔹 PLACEHOLDERS */
function startLearning() {
    alert("Coming soon: Learning modules");
}

function takeTest() {
    alert("Coming soon: NEET tests");
}

window.startLearning = startLearning;
window.takeTest = takeTest;

</script>

</body>
</html>
