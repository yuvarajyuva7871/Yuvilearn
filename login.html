<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Yuvilearn</title>
<style>
:root {
    --bg: #020617;
    --surface: #0f172a;
    --text: #f8fafc;
    --muted: #94a3b8;
    --border: #1e293b;
    --brand: #22c55e;
    --brand-dark: #16a34a;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, 'Segoe UI', sans-serif;
    color: var(--text);
    background: radial-gradient(circle at top, #143866, var(--bg) 52%);
    display: grid;
    place-items: center;
    padding: 20px;
}
.card {
    width: min(440px, 100%);
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 26px;
}
h1 { margin: 0 0 8px; }
p { margin: 0 0 20px; color: var(--muted); }
label { font-weight: 600; font-size: 0.92rem; }
input {
    width: 100%;
    margin: 8px 0 14px;
    padding: 11px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #071225;
    color: var(--text);
}
button {
    width: 100%;
    margin-top: 4px;
    border: none;
    border-radius: 10px;
    padding: 11px;
    font-weight: 700;
    cursor: pointer;
}
.primary {
    background: linear-gradient(90deg, var(--brand), var(--brand-dark));
    color: #04210f;
}
.secondary {
    background: #172b4d;
    border: 1px solid #294d7a;
    color: #c6e3ff;
}
.links {
    margin-top: 16px;
    text-align: center;
    color: var(--muted);
}
.links a { color: #86efac; }
.status {
    margin-top: 10px;
    min-height: 20px;
    font-size: 0.9rem;
    color: #fca5a5;
}
</style>
</head>
<body>
<main class="card">
    <h1>Welcome back 👋</h1>
    <p>Sign in to continue your NEET learning plan.</p>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="student@email.com" autocomplete="email">

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter password" autocomplete="current-password">

    <button class="primary" onclick="login()">Login</button>
    <button class="secondary" onclick="googleLogin()">Continue with Google</button>
    <div class="status" id="status"></div>

    <div class="links">
        New to Yuvilearn? <a href="signup.html">Create account</a><br>
        <a href="index.html">← Back to Home</a>
    </div>
</main>

<script type="module">
import { auth } from './firebase.js';
import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const statusEl = document.getElementById('status');

function setStatus(message, isError = true) {
    statusEl.style.color = isError ? '#fca5a5' : '#86efac';
    statusEl.textContent = message;
}

async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
        setStatus('Please enter both email and password.');
        return;
    }

    try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        const user = result.user;
        localStorage.setItem('email', user.email || email);
        localStorage.setItem('name', localStorage.getItem('name') || user.displayName || 'Student');
        localStorage.setItem('class', localStorage.getItem('class') || 'Not set');
        localStorage.setItem('goal', localStorage.getItem('goal') || 'NEET');
        setStatus('Login successful. Redirecting...', false);
        window.location.href = 'dashboard.html';
    } catch (error) {
        setStatus(error.message);
    }
}

async function googleLogin() {
    const provider = new GoogleAuthProvider();
    try {
        const result = await signInWithPopup(auth, provider);
        localStorage.setItem('email', result.user.email || '');
        localStorage.setItem('name', result.user.displayName || 'Student');
        localStorage.setItem('class', localStorage.getItem('class') || 'Not set');
        localStorage.setItem('goal', localStorage.getItem('goal') || 'NEET');
        setStatus('Google login successful. Redirecting...', false);
        window.location.href = 'dashboard.html';
    } catch (error) {
        setStatus(error.message);
    }
}

window.login = login;
window.googleLogin = googleLogin;
</script>
</body>
</html>
