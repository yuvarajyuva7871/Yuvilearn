<!DOCTYPE html>
<html>
<head>
<title>Login - Yuvilearn</title>
</head>

<body style="background:#0f172a; color:white; text-align:center;">

<h1>Login</h1>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()" style="padding:10px 20px;background:#22c55e;color:white;border:none;border-radius:8px;">
Login
</button>

<br><br>

<button onclick="googleLogin()" style="padding:10px 20px;background:#4285F4;color:white;border:none;border-radius:8px;">
Login with Google
</button>

<p>New user? <a href="signup.html">Sign Up</a></p>

<script type="module">

import { auth } from './firebase.js';
import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔹 EMAIL LOGIN
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, password);

        // ✅ Store user data
        localStorage.setItem("email", email);

        if (!localStorage.getItem("name")) {
            localStorage.setItem("name", "Student");
            localStorage.setItem("class", "Not set");
            localStorage.setItem("goal", "NEET");
        }

        alert("Login successful!");
        window.location.href = "dashboard.html";

    } catch (error) {
        alert(error.message);
    }
}

// 🔹 GOOGLE LOGIN
async function googleLogin() {
    const provider = new GoogleAuthProvider();

    try {
        const result = await signInWithPopup(auth, provider);

        // Store basic data
        localStorage.setItem("email", result.user.email);
        localStorage.setItem("name", result.user.displayName || "Student");

        alert("Google Login Successful!");
        window.location.href = "dashboard.html";

    } catch (error) {
        alert(error.message);
    }
}

// expose to HTML
window.login = login;
window.googleLogin = googleLogin;

</script>

</body>
</html>
