<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — YuviLearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05080f; --surface: #0c1220; --card: #101828;
  --border: rgba(255,255,255,0.07); --text: #f0f4ff; --muted: #8a9ab5;
  --green: #00d68f; --green-dim: rgba(0,214,143,0.1); --cyan: #00b4d8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  display: grid; place-items: center;
  padding: 24px;
  background-image:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,214,143,0.1) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(0,180,216,0.06) 0%, transparent 60%);
}
.card {
  width: min(440px, 100%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,214,143,0.05);
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem; font-weight: 900;
  background: linear-gradient(135deg, var(--green), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-decoration: none;
  display: inline-block; margin-bottom: 28px;
}
h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
.subtitle { color: var(--muted); font-size: 0.92rem; margin-bottom: 28px; }
.field { margin-bottom: 18px; }
.field label {
  display: block; font-size: 0.8rem; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px;
}
.field input {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 13px 16px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
  outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: var(--green); }
.btn-primary {
  width: 100%; background: linear-gradient(135deg, var(--green), #00b47e);
  color: #021a0f; border: none; border-radius: 12px;
  padding: 14px; font-family: 'DM Sans', sans-serif;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: opacity 0.2s, transform 0.2s; margin-bottom: 12px;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-google {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 13px; font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem; font-weight: 600; color: var(--text);
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 10px;
  transition: background 0.2s, border-color 0.2s;
}
.btn-google:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 16px 0; color: var(--muted); font-size: 0.8rem;
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}
.status { min-height: 20px; margin-top: 12px; font-size: 0.87rem; border-radius: 8px; }
.status.error { color: #f87171; }
.status.success { color: var(--green); }
.links { margin-top: 20px; text-align: center; color: var(--muted); font-size: 0.88rem; line-height: 2; }
.links a { color: var(--green); text-decoration: none; font-weight: 600; }
.links a:hover { text-decoration: underline; }
</style>
</head>
<body>
<main class="card">
  <a href="index.html" class="logo">YuviLearn</a>
  <h1>Welcome back 👋</h1>
  <p class="subtitle">Sign in to continue your NEET study plan.</p>

  <div class="field">
    <label>Email</label>
    <input id="email" type="email" placeholder="student@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
  </div>

  <button class="btn-primary" onclick="login()">Login to Dashboard</button>

  <div class="divider">or</div>

  <button class="btn-google" onclick="googleLogin()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.26 9.77A7.24 7.24 0 0 1 12 4.76c1.75 0 3.32.64 4.56 1.68l3.4-3.4A11.96 11.96 0 0 0 12 0C7.37 0 3.36 2.7 1.28 6.63l3.98 3.14Z"/><path fill="#34A853" d="M16.04 18.01A7.22 7.22 0 0 1 12 19.24c-2.99 0-5.56-1.83-6.74-4.47l-3.98 3.13A12 12 0 0 0 12 24c3.23 0 6.17-1.17 8.41-3.1l-4.37-2.9Z"/><path fill="#4A90D9" d="M20.41 20.9A12 12 0 0 0 24 12c0-.74-.08-1.5-.21-2.24H12v4.76h6.85a5.87 5.87 0 0 1-2.46 3.5l4.02 2.88Z"/><path fill="#FBBC05" d="M5.26 14.23A7.23 7.23 0 0 1 4.76 12c0-.78.14-1.53.5-2.23L1.28 6.63A12 12 0 0 0 0 12c0 1.94.47 3.78 1.28 5.37l3.98-3.14Z"/></svg>
    Continue with Google
  </button>

  <div class="status" id="status"></div>

  <div class="links">
    New to YuviLearn? <a href="signup.html">Create account</a><br>
    <a href="index.html">← Back to Home</a>
  </div>
</main>

<script type="module">
import { auth } from './firebase.js';
import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const statusEl = document.getElementById('status');
function setStatus(msg, isError=true) {
  statusEl.className = 'status ' + (isError ? 'error' : 'success');
  statusEl.textContent = msg;
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return setStatus('Please enter both email and password.');
  try {
    const result = await signInWithEmailAndPassword(auth, email, password);
    localStorage.setItem('email', result.user.email || email);
    localStorage.setItem('name', result.user.displayName || localStorage.getItem('name') || 'Student');
    setStatus('Login successful — redirecting…', false);
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch(e) { setStatus(e.message); }
}

async function googleLogin() {
  try {
    const result = await signInWithPopup(auth, new GoogleAuthProvider());
    localStorage.setItem('email', result.user.email || '');
    localStorage.setItem('name', result.user.displayName || 'Student');
    setStatus('Google login successful — redirecting…', false);
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch(e) { setStatus(e.message); }
}

window.login = login;
window.googleLogin = googleLogin;
</script>
</body>
</html>
