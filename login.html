<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — YuviLearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #1B4FD8; --blue-dark: #1340B8; --blue-light: #3B6EF8;
  --orange: #F97316; --bg: #F0F4FF; --white: #FFFFFF;
  --dark: #0F172A; --dark2: #1E293B; --muted: #64748B;
  --border: #E2E8F0; --green: #10B981;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #EEF2FF 0%, #DBEAFE 50%, #FFF7ED 100%);
  min-height: 100vh;
  display: grid; place-items: center; padding: 24px;
  position: relative; overflow: hidden;
}
.blob1 {
  position: fixed; width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(27,79,216,0.15) 0%, transparent 70%);
  top: -150px; left: -150px; border-radius: 50%;
  filter: blur(60px); pointer-events: none;
}
.blob2 {
  position: fixed; width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(249,115,22,0.12) 0%, transparent 70%);
  bottom: -100px; right: -100px; border-radius: 50%;
  filter: blur(60px); pointer-events: none;
}
.card {
  width: min(460px, 100%);
  background: white;
  border: 2px solid rgba(27,79,216,0.1);
  border-radius: 24px; padding: 48px 40px;
  box-shadow: 0 24px 64px rgba(27,79,216,0.12);
  animation: fadeIn 0.5s ease;
  position: relative; z-index: 1;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
.logo-wrap {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; margin-bottom: 32px;
}
.logo-wrap img { height: 48px; }
.logo-text {
  font-family: 'Nunito', sans-serif; font-size: 1.5rem; font-weight: 900;
  background: linear-gradient(135deg, var(--blue), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.card-header { margin-bottom: 32px; }
.card-header h1 { font-family: 'Nunito', sans-serif; font-size: 1.8rem; font-weight: 900; color: var(--dark); margin-bottom: 6px; }
.card-header p { color: var(--muted); font-size: 0.92rem; }
.field { margin-bottom: 20px; }
.field label {
  display: block; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px;
}
.field input {
  width: 100%; background: #F8FAFF;
  border: 2px solid var(--border); border-radius: 12px;
  padding: 13px 16px; color: var(--dark);
  font-family: 'Poppins', sans-serif; font-size: 0.95rem;
  outline: none; transition: all 0.2s;
}
.field input:focus { border-color: var(--blue); background: white; box-shadow: 0 0 0 4px rgba(27,79,216,0.08); }
.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--blue), var(--blue-light));
  color: white; border: none; border-radius: 12px;
  padding: 15px; font-family: 'Poppins', sans-serif;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: all 0.2s; margin-bottom: 14px;
  box-shadow: 0 4px 16px rgba(27,79,216,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(27,79,216,0.4); }
.btn-google {
  width: 100%; background: white; border: 2px solid var(--border);
  border-radius: 12px; padding: 13px;
  font-family: 'Poppins', sans-serif; font-size: 0.92rem; font-weight: 600;
  color: var(--dark2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.2s;
}
.btn-google:hover { border-color: var(--blue); background: #F8FAFF; }
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 16px 0; color: var(--muted); font-size: 0.8rem;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.status { min-height: 20px; margin-top: 14px; font-size: 0.87rem; border-radius: 8px; padding: 0 2px; }
.status.error { color: #EF4444; }
.status.success { color: var(--green); font-weight: 600; }
.links { margin-top: 24px; text-align: center; color: var(--muted); font-size: 0.88rem; line-height: 2; }
.links a { color: var(--blue); text-decoration: none; font-weight: 700; }
.links a:hover { text-decoration: underline; }
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(27,79,216,0.07); border: 1px solid rgba(27,79,216,0.15);
  color: var(--blue); padding: 6px 14px; border-radius: 50px;
  font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em;
  text-transform: uppercase; margin-bottom: 24px;
}
</style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>
<main class="card">
  <a href="index.html" class="logo-wrap">
    <img src="logo.webp" alt="YuviLearn">
    <span class="logo-text">YuviLearn</span>
  </a>
  <div class="badge">🔒 Secure Student Login</div>
  <div class="card-header">
    <h1>Welcome back! 👋</h1>
    <p>Sign in to continue your NEET study plan.</p>
  </div>

  <div class="field">
    <label>Email Address</label>
    <input id="email" type="email" placeholder="student@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
  </div>

  <button class="btn-primary" onclick="login()">Login to Dashboard →</button>

  <div class="divider">or</div>

  <button class="btn-google" onclick="googleLogin()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.26 9.77A7.24 7.24 0 0 1 12 4.76c1.75 0 3.32.64 4.56 1.68l3.4-3.4A11.96 11.96 0 0 0 12 0C7.37 0 3.36 2.7 1.28 6.63l3.98 3.14Z"/><path fill="#34A853" d="M16.04 18.01A7.22 7.22 0 0 1 12 19.24c-2.99 0-5.56-1.83-6.74-4.47l-3.98 3.13A12 12 0 0 0 12 24c3.23 0 6.17-1.17 8.41-3.1l-4.37-2.9Z"/><path fill="#4A90D9" d="M20.41 20.9A12 12 0 0 0 24 12c0-.74-.08-1.5-.21-2.24H12v4.76h6.85a5.87 5.87 0 0 1-2.46 3.5l4.02 2.88Z"/><path fill="#FBBC05" d="M5.26 14.23A7.23 7.23 0 0 1 4.76 12c0-.78.14-1.53.5-2.23L1.28 6.63A12 12 0 0 0 0 12c0 1.94.47 3.78 1.28 5.37l3.98-3.14Z"/></svg>
    Continue with Google
  </button>

  <div class="status" id="status"></div>

  <div class="links">
    New to YuviLearn? <a href="signup.html">Create account →</a><br>
    <a href="index.html">← Back to Home</a>
  </div>
</main>

<script type="module">
import { auth } from './firebase.js';
import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const statusEl = document.getElementById('status');
function setStatus(msg, isError=true) {
  statusEl.className = 'status ' + (isError ? 'error' : 'success');
  statusEl.textContent = msg;
}
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return setStatus('⚠ Please enter both email and password.');
  try {
    const result = await signInWithEmailAndPassword(auth, email, password);
    localStorage.setItem('email', result.user.email || email);
    localStorage.setItem('name', result.user.displayName || localStorage.getItem('name') || 'Student');
    setStatus('✓ Login successful — redirecting to dashboard…', false);
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch(e) { setStatus('⚠ ' + e.message); }
}
async function googleLogin() {
  try {
    const result = await signInWithPopup(auth, new GoogleAuthProvider());
    localStorage.setItem('email', result.user.email || '');
    localStorage.setItem('name', result.user.displayName || 'Student');
    setStatus('✓ Google login successful — redirecting…', false);
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch(e) { setStatus('⚠ ' + e.message); }
}
window.login = login;
window.googleLogin = googleLogin;
</script>
</body>
</html>
