<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Yuvilearn</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .auth-container { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; position: relative; }
    .auth-card { width: 100%; max-width: 450px; padding: 3rem; position: relative; z-index: 10; text-align: center; }
    .auth-card h2 { font-size: 2rem; margin-bottom: 0.5rem; }
    .auth-card p { color: var(--text-muted); margin-bottom: 2.5rem; }
    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-group label { display: block; font-size: 0.875rem; margin-bottom: 0.5rem; font-weight: 500; color: #cbd5e1; }
    .form-control { width: 100%; padding: 0.75rem 1rem; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border); border-radius: 8px; color: white; font-family: inherit; transition: all 0.3s ease; }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2); }
    .w-full { width: 100%; }
    .auth-footer { margin-top: 2rem; font-size: 0.875rem; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); font-weight: 600; cursor: pointer; }
    .auth-footer a:hover { text-decoration: underline; }
    .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: var(--primary); border-radius: 50%; position: absolute; filter: blur(100px); opacity: 0.3; }
    .blob-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: var(--secondary); border-radius: 50%; position: absolute; filter: blur(100px); opacity: 0.3; }
  </style>
</head>
<body class="bg-pattern">
  <div class="blob-1"></div>
  <div class="blob-2"></div>

  <nav id="navbar" style="padding: 1.5rem 2rem;">
    <a href="index.html" class="logo">Yuvilearn</a>
  </nav>

  <main class="auth-container">
    <div class="glass-panel auth-card fade-in-up">
      <h2>Welcome Back</h2>
      <p>Sign in to continue tracking your NEET progress.</p>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="student@yuvilearn.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary w-full" style="margin-top: 1rem;">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a onclick="handleLogin(event)">Create one instantly</a>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
