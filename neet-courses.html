<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEET Courses – Yuvilearn</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .courses-page{max-width:1100px;margin:0 auto;padding:28px 20px}

    /* Subject Tabs */
    .subject-tabs{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap}
    .subj-tab-btn{padding:12px 24px;border-radius:50px;border:2px solid #ddd;background:#fff;font-weight:700;font-size:0.9rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
    .subj-tab-btn:hover{border-color:#1e4db7}
    .subj-tab-btn.bio-active{background:#dcfce7;border-color:#16a34a;color:#166534}
    .subj-tab-btn.phys-active{background:#dbeafe;border-color:#1e4db7;color:#1e4db7}
    .subj-tab-btn.chem-active{background:#fed7aa;border-color:#d97706;color:#92400e}

    /* Course Hero */
    .course-hero{border-radius:20px;padding:32px;margin-bottom:28px;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
    .bio-hero{background:linear-gradient(135deg,#166534,#16a34a)}
    .phys-hero{background:linear-gradient(135deg,#0a1628,#1e4db7)}
    .chem-hero{background:linear-gradient(135deg,#92400e,#d97706)}
    .ch-title{font-size:1.5rem;font-weight:800;margin-bottom:6px}
    .ch-sub{opacity:0.88;font-size:0.9rem;margin-bottom:16px}
    .ch-pills{display:flex;gap:8px;flex-wrap:wrap}
    .ch-pill{background:rgba(255,255,255,0.2);padding:5px 14px;border-radius:50px;font-size:0.78rem;font-weight:600}
    .ch-stats{display:flex;gap:20px;flex-wrap:wrap}
    .ch-stat-val{font-size:1.6rem;font-weight:800;display:block}
    .ch-stat-lbl{font-size:0.75rem;opacity:0.8}

    /* Chapter List */
    .chapter-section{margin-bottom:28px}
    .chapter-section h3{font-size:1rem;font-weight:800;color:#0a1628;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #f0f4ff}
    .chapters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
    .chapter-item{background:#f0f4ff;border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px solid transparent;transition:all .15s;text-decoration:none}
    .chapter-item:hover{border-color:#1e4db7;transform:translateX(4px)}
    .chapter-item.locked{opacity:0.6;cursor:pointer}
    .ch-num{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.85rem;flex-shrink:0;color:#fff}
    .bio-num{background:#16a34a}
    .phys-num{background:#1e4db7}
    .chem-num{background:#d97706}
    .ch-info{flex:1}
    .ch-name{font-weight:700;font-size:0.88rem;color:#0a1628;margin-bottom:3px}
    .ch-meta{font-size:0.75rem;color:#888}
    .ch-status{font-size:1rem;flex-shrink:0}
    .lock-badge{background:#fee2e2;color:#991b1b;padding:3px 8px;border-radius:50px;font-size:0.7rem;font-weight:700}
    .free-badge{background:#dcfce7;color:#166534;padding:3px 8px;border-radius:50px;font-size:0.7rem;font-weight:700}

    /* Premium CTA */
    .premium-cta{background:linear-gradient(135deg,#0a1628,#1e4db7);border-radius:18px;padding:28px;text-align:center;color:#fff;margin-top:24px}
    .premium-cta h3{font-size:1.2rem;font-weight:800;margin-bottom:8px}
    .premium-cta p{opacity:0.85;margin-bottom:20px;font-size:0.9rem}
    .btn-unlock{background:#fff;color:#1e4db7;padding:13px 32px;border-radius:50px;font-weight:800;border:none;cursor:pointer;font-size:1rem;transition:all .2s}
    .btn-unlock:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.2)}
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">🧬 Yuvilearn NEET</div>
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="neet-courses.html" class="active">Courses</a></li>
        <li><a href="mocktest.html">Mock Tests</a></li>
        <li><a href="neet-dashboard.html">Dashboard</a></li>
        <li><a href="doubts.html">Doubts</a></li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <h1>📚 NEET Courses</h1>
    <p>Complete chapter-wise study material for Biology, Physics & Chemistry</p>
  </div>

  <div class="courses-page">
    <!-- Subject Tabs -->
    <div class="subject-tabs">
      <button class="subj-tab-btn bio-active" id="tab-bio" onclick="showSubject('biology')">🧬 Biology (90Q)</button>
      <button class="subj-tab-btn" id="tab-phys" onclick="showSubject('physics')">⚡ Physics (45Q)</button>
      <button class="subj-tab-btn" id="tab-chem" onclick="showSubject('chemistry')">🧪 Chemistry (45Q)</button>
    </div>

    <div id="courseContent"></div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">🧬 Yuvilearn NEET</div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="neet-courses.html">Courses</a>
        <a href="mocktest.html">Mock Tests</a>
        <a href="neet-dashboard.html">Dashboard</a>
      </div>
      <p class="footer-copy">© 2026 Yuvilearn. Built for NEET Aspirants ❤️</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
  // NEET Complete Chapter List
  const neetChapters = {
    biology: {
      name:'Biology', icon:'🧬', questions:90, marks:360,
      color:'#16a34a', numClass:'bio-num', heroClass:'bio-hero',
      pills:['Botany','Zoology','90 Questions','360 Marks'],
      units: [
        { name:'Unit 1: Diversity of Living Organisms', chapters:[
          {n:'The Living World', free:true},
          {n:'Biological Classification', free:true},
          {n:'Plant Kingdom', free:false},
          {n:'Animal Kingdom', free:false}
        ]},
        { name:'Unit 2: Structural Organisation', chapters:[
          {n:'Morphology of Flowering Plants', free:true},
          {n:'Anatomy of Flowering Plants', free:false},
          {n:'Structural Organisation in Animals', free:false}
        ]},
        { name:'Unit 3: Cell Structure & Function', chapters:[
          {n:'Cell — The Unit of Life', free:true},
          {n:'Biomolecules', free:false},
          {n:'Cell Cycle and Cell Division', free:false}
        ]},
        { name:'Unit 4: Plant Physiology', chapters:[
          {n:'Transport in Plants', free:false},
          {n:'Mineral Nutrition', free:false},
          {n:'Photosynthesis in Higher Plants', free:true},
          {n:'Respiration in Plants', free:false},
          {n:'Plant Growth and Development', free:false}
        ]},
        { name:'Unit 5: Human Physiology', chapters:[
          {n:'Digestion and Absorption', free:true},
          {n:'Breathing and Exchange of Gases', free:false},
          {n:'Body Fluids and Circulation', free:false},
          {n:'Excretory Products and Elimination', free:false},
          {n:'Locomotion and Movement', free:false},
          {n:'Neural Control and Coordination', free:false},
          {n:'Chemical Coordination', free:false}
        ]},
        { name:'Unit 6: Reproduction', chapters:[
          {n:'Reproduction in Organisms', free:false},
          {n:'Sexual Reproduction in Flowering Plants', free:false},
          {n:'Human Reproduction', free:true},
          {n:'Reproductive Health', free:false}
        ]},
        { name:'Unit 7: Genetics & Evolution', chapters:[
          {n:'Principles of Inheritance and Variation', free:true},
          {n:'Molecular Basis of Inheritance', free:false},
          {n:'Evolution', free:false}
        ]},
        { name:'Unit 8: Biology & Human Welfare', chapters:[
          {n:'Human Health and Disease', free:true},
          {n:'Strategies for Enhancement in Food Production', free:false},
          {n:'Microbes in Human Welfare', free:false}
        ]},
        { name:'Unit 9: Biotechnology', chapters:[
          {n:'Biotechnology — Principles and Processes', free:false},
          {n:'Biotechnology and its Applications', free:false}
        ]},
        { name:'Unit 10: Ecology', chapters:[
          {n:'Organisms and Populations', free:false},
          {n:'Ecosystem', free:true},
          {n:'Biodiversity and Conservation', free:false},
          {n:'Environmental Issues', free:false}
        ]}
      ]
    },
    physics: {
      name:'Physics', icon:'⚡', questions:45, marks:180,
      color:'#1e4db7', numClass:'phys-num', heroClass:'phys-hero',
      pills:['Class 11 & 12','45 Questions','180 Marks','Formula Sheets'],
      units: [
        { name:'Class 11 Physics', chapters:[
          {n:'Physical World & Measurement', free:true},
          {n:'Kinematics', free:true},
          {n:'Laws of Motion', free:true},
          {n:'Work, Energy and Power', free:false},
          {n:'Motion of System of Particles', free:false},
          {n:'Gravitation', free:false},
          {n:'Properties of Bulk Matter', free:false},
          {n:'Thermodynamics', free:false},
          {n:'Behaviour of Perfect Gas & Kinetic Theory', free:false},
          {n:'Oscillations and Waves', free:false}
        ]},
        { name:'Class 12 Physics', chapters:[
          {n:'Electrostatics', free:true},
          {n:'Current Electricity', free:false},
          {n:'Magnetic Effects of Current & Magnetism', free:false},
          {n:'Electromagnetic Induction & Alternating Currents', free:false},
          {n:'Electromagnetic Waves', free:false},
          {n:'Optics', free:false},
          {n:'Dual Nature of Matter and Radiation', free:false},
          {n:'Atoms & Nuclei', free:false},
          {n:'Electronic Devices', free:false}
        ]}
      ]
    },
    chemistry: {
      name:'Chemistry', icon:'🧪', questions:45, marks:180,
      color:'#d97706', numClass:'chem-num', heroClass:'chem-hero',
      pills:['Physical + Organic + Inorganic','45 Questions','180 Marks'],
      units: [
        { name:'Physical Chemistry', chapters:[
          {n:'Some Basic Concepts of Chemistry', free:true},
          {n:'Structure of Atom', free:true},
          {n:'States of Matter', free:false},
          {n:'Thermodynamics', free:false},
          {n:'Equilibrium', free:false},
          {n:'Redox Reactions', free:false},
          {n:'Solutions', free:false},
          {n:'Electrochemistry', free:false},
          {n:'Chemical Kinetics', free:false},
          {n:'Surface Chemistry', free:false}
        ]},
        { name:'Inorganic Chemistry', chapters:[
          {n:'Periodic Table & Properties', free:true},
          {n:'Chemical Bonding', free:false},
          {n:'Hydrogen', free:false},
          {n:'s-Block Elements', free:false},
          {n:'p-Block Elements', free:false},
          {n:'d & f-Block Elements', free:false},
          {n:'Coordination Compounds', free:false},
          {n:'Environmental Chemistry', free:false}
        ]},
        { name:'Organic Chemistry', chapters:[
          {n:'Basic Principles of Organic Chemistry', free:true},
          {n:'Hydrocarbons', free:false},
          {n:'Haloalkanes and Haloarenes', free:false},
          {n:'Alcohols, Phenols and Ethers', free:false},
          {n:'Aldehydes, Ketones & Carboxylic Acids', free:false},
          {n:'Organic Compounds with Nitrogen', free:false},
          {n:'Biomolecules', free:false},
          {n:'Polymers', free:false},
          {n:'Chemistry in Everyday Life', free:false}
        ]}
      ]
    }
  };

  let currentSubject = 'biology';

  // Check premium
  const isPremium = localStorage.getItem('yuvi_premium') === 'true';

  function showSubject(subj) {
    currentSubject = subj;

    // Update tabs
    document.querySelectorAll('.subj-tab-btn').forEach(t => {
      t.className = 'subj-tab-btn';
    });
    if(subj==='biology') document.getElementById('tab-bio').classList.add('bio-active');
    if(subj==='physics') document.getElementById('tab-phys').classList.add('phys-active');
    if(subj==='chemistry') document.getElementById('tab-chem').classList.add('chem-active');

    const data = neetChapters[subj];
    let chapterNum = 1;

    // Build units HTML
    const unitsHTML = data.units.map(unit => {
      const chaptersHTML = unit.chapters.map(ch => {
        const num = chapterNum++;
        const isLocked = !ch.free && !isPremium;
        return `
          <a href="${isLocked?'#':'mocktest.html'}"
            class="chapter-item ${isLocked?'locked':''}"
            onclick="${isLocked?'showUpgrade(event)':''}">
            <div class="ch-num ${data.numClass}">${num}</div>
            <div class="ch-info">
              <div class="ch-name">${ch.n}</div>
              <div class="ch-meta">Notes · Quiz · Formula sheet</div>
            </div>
            <div class="ch-status">
              ${ch.free
                ? '<span class="free-badge">FREE</span>'
                : isLocked
                  ? '<span class="lock-badge">🔒 PRO</span>'
                  : '✅'}
            </div>
          </a>`;
      }).join('');

      return `
        <div class="chapter-section">
          <h3>${unit.name}</h3>
          <div class="chapters-grid">${chaptersHTML}</div>
        </div>`;
    }).join('');

    const totalChapters = data.units.reduce((a,u)=>a+u.chapters.length,0);
    const freeChapters  = data.units.reduce((a,u)=>a+u.chapters.filter(c=>c.free).length,0);

    document.getElementById('courseContent').innerHTML = `
      <!-- Hero -->
      <div class="course-hero ${data.heroClass}">
        <div>
          <div class="ch-title">${data.icon} ${data.name}</div>
          <div class="ch-sub">Complete NEET ${data.name} — All chapters, notes and tests</div>
          <div class="ch-pills">
            ${data.pills.map(p=>`<span class="ch-pill">${p}</span>`).join('')}
          </div>
        </div>
        <div class="ch-stats">
          <div><span class="ch-stat-val">${totalChapters}</span><span class="ch-stat-lbl">Chapters</span></div>
          <div><span class="ch-stat-val">${data.questions}</span><span class="ch-stat-lbl">NEET Questions</span></div>
          <div><span class="ch-stat-val">${data.marks}</span><span class="ch-stat-lbl">Total Marks</span></div>
          <div><span class="ch-stat-val">${freeChapters}</span><span class="ch-stat-lbl">Free Chapters</span></div>
        </div>
      </div>

      <!-- Chapters -->
      ${unitsHTML}

      <!-- Premium CTA -->
      ${!isPremium ? `
      <div class="premium-cta">
        <h3>🔓 Unlock All ${totalChapters} Chapters</h3>
        <p>Get full access to all chapters, notes, quizzes and PDFs for just ₹99/month</p>
        <button class="btn-unlock" onclick="window.location.href='index.html#plans'">
          🚀 Get Premium — ₹99/month
        </button>
      </div>` : ''}`;
  }

  function showUpgrade(e) {
    e.preventDefault();
    if(confirm('🔒 This chapter is only available for Premium students.\n\nGet full access for just ₹99/month!\n\nClick OK to see plans.')) {
      window.location.href = 'index.html#plans';
    }
  }

  // Load subject from URL parameter
  const urlParams = new URLSearchParams(window.location.search);
  const urlSubject = urlParams.get('subject');
  if(urlSubject && neetChapters[urlSubject]) {
    showSubject(urlSubject);
  } else {
    showSubject('biology');
  }
  </script>
</body>
</html>
