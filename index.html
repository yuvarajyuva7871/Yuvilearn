<!DOCTYPE html>
<html lang="en">

  <title>Yuvilearn</title>

  <style>
   <body class="bg-gray-50 text-gray-800 font-sans">

      <a href="jee.html" class="bg-white p-6 rounded-xl shadow hover:scale-105 transition">

      </div>
