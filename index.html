<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yuvilearn AI - NEET Platform</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        .container {
            margin-top: 50px;
        }
        textarea {
            width: 60%;
            height: 100px;
            border-radius: 10px;
            padding: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
        .output {
            margin-top: 20px;
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Yuvilearn AI</h1>
        <h3>Your NEET Smart Study Companion</h3>

        <select id="subject">
            <option>Physics</option>
            <option>Chemistry</option>
            <option>Biology</option>
        </select>

        <br><br>

        <textarea id="question" placeholder="Ask your NEET doubt..."></textarea>
        <br><br>

        <button onclick="solveDoubt()">Solve with AI</button>

        <div class="output" id="answerBox">
            Answer will appear here...
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
