<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEET Dashboard – Yuvilearn</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .nd-page{max-width:1100px;margin:0 auto;padding:28px 20px}

    /* Welcome */
    .nd-welcome{background:linear-gradient(135deg,#0a1628,#1e4db7);border-radius:20px;padding:28px 32px;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px}
    .nd-welcome-left{display:flex;align-items:center;gap:16px}
    .nd-avatar{font-size:3rem;background:rgba(255,255,255,0.15);border-radius:50%;width:64px;height:64px;display:flex;align-items:center;justify-content:center}
    .nd-name{font-size:1.3rem;font-weight:800}
    .nd-sub{opacity:0.8;font-size:0.88rem;margin-top:3px}
    .nd-countdown-mini{background:rgba(255,255,255,0.12);border-radius:14px;padding:14px 20px;text-align:center}
    .nd-days{font-size:2rem;font-weight:800;color:#60a5fa}
    .nd-days-lbl{font-size:0.75rem;opacity:0.8}

    /* Stats */
    .nd-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
    .nd-stat{background:#f0f4ff;border-radius:14px;padding:18px;text-align:center}
    .nd-stat-val{font-size:1.6rem;font-weight:800;color:#1e4db7}
    .nd-stat-lbl{font-size:0.75rem;color:#666;font-weight:600;margin-top:3px}

    /* Grid */
    .nd-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    @media(max-width:700px){.nd-grid{grid-template-columns:1fr}}
    .nd-card{background:#f0f4ff;border-radius:18px;padding:22px}
    .nd-card h3{font-size:0.95rem;font-weight:800;color:#0a1628;margin-bottom:16px;display:flex;align-items:center;gap:8px}

    /* Score Predictor */
    .score-predictor{background:linear-gradient(135deg,#0a1628,#1e4db7);border-radius:18px;padding:28px;margin-bottom:24px;color:#fff}
    .score-predictor h3{font-size:1rem;font-weight:800;margin-bottom:20px}
    .predictor-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
    @media(max-width:600px){.predictor-grid{grid-template-columns:1fr}}
    .pred-card{background:rgba(255,255,255,0.1);border-radius:14px;padding:18px;text-align:center;border:1px solid rgba(255,255,255,0.15)}
    .pred-score{font-size:2rem;font-weight:800;color:#60a5fa}
    .pred-max{font-size:0.85rem;opacity:0.7}
    .pred-label{font-size:0.78rem;opacity:0.8;margin-top:4px}
    .pred-bar{background:rgba(255,255,255,0.15);border-radius:50px;height:6px;overflow:hidden;margin:10px 0}
    .pred-bar-fill{height:100%;background:#60a5fa;border-radius:50px;transition:width 1s ease}
    .rank-highlight{background:rgba(255,255,255,0.1);border-radius:14px;padding:20px;text-align:center;margin-top:16px;border:1px solid rgba(255,255,255,0.2)}
    .rank-val{font-size:1.8rem;font-weight:800;color:#22c55e}
    .rank-lbl{font-size:0.85rem;opacity:0.8;margin-top:4px}
    .rank-note{font-size:0.75rem;opacity:0.65;margin-top:4px}

    /* Daily Target */
    .target-card{background:#f0f4ff;border-radius:18px;padding:22px;margin-bottom:24px}
    .target-card h3{font-size:0.95rem;font-weight:800;color:#0a1628;margin-bottom:6px}
    .target-subtitle{font-size:0.82rem;color:#888;margin-bottom:18px}
    .target-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    @media(max-width:500px){.target-grid{grid-template-columns:1fr}}
    .target-subject{background:#fff;border-radius:14px;padding:16px}
    .target-subj-name{font-weight:700;font-size:0.88rem;color:#0a1628;margin-bottom:12px}
    .target-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f4ff;font-size:0.82rem}
    .target-item:last-child{border:none}
    .target-ch{color:#444;font-weight:500}
    .target-check{width:22px;height:22px;border-radius:6px;border:2px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
    .target-check.done{background:#1e4db7;border-color:#1e4db7;color:#fff}
    .target-progress{margin-top:10px}
    .target-pct{font-size:0.78rem;color:#888;display:flex;justify-content:space-between;margin-bottom:4px}
    .target-bar{background:#e2e8f0;border-radius:50px;height:6px;overflow:hidden}
    .target-bar-fill{height:100%;border-radius:50px;transition:width .5s}
    .bio-bar{background:#16a34a}
    .physics-bar{background:#1e4db7}
    .chem-bar{background:#d97706}

    /* Subject Progress */
    .subj-progress{display:flex;flex-direction:column;gap:14px}
    .sp-item{}
    .sp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .sp-name{font-weight:700;font-size:0.88rem;color:#0a1628}
    .sp-count{font-size:0.78rem;color:#888}
    .sp-track{background:#ddd;border-radius:50px;height:10px;overflow:hidden}
    .sp-fill{height:100%;border-radius:50px;transition:width .8s}

    /* Quiz History */
    .quiz-list{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
    .qi{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:10px;padding:10px 14px;font-size:0.85rem}
    .qi-left{display:flex;align-items:center;gap:10px}
    .qi-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .qi-name{font-weight:600;color:#0a1628;font-size:0.82rem}
    .qi-date{font-size:0.72rem;color:#aaa}
    .qi-badge{padding:3px 10px;border-radius:50px;font-size:0.75rem;font-weight:700}
    .qi-pass{background:#dcfce7;color:#166534}
    .qi-fail{background:#fee2e2;color:#991b1b}
    .no-data{color:#aaa;font-size:0.85rem;text-align:center;padding:20px}

    /* Weak Chapters */
    .weak-list{display:flex;flex-direction:column;gap:8px}
    .weak-item{display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:10px 14px;font-size:0.82rem}
    .weak-icon{font-size:1.1rem;flex-shrink:0}
    .weak-name{flex:1;font-weight:600;color:#0a1628}
    .weak-score{padding:3px 10px;border-radius:50px;background:#fee2e2;color:#991b1b;font-size:0.75rem;font-weight:700}
    .weak-action{color:#1e4db7;font-weight:600;font-size:0.78rem;text-decoration:none}
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">🧬 Yuvilearn NEET</div>
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="neet-courses.html">Courses</a></li>
        <li><a href="mocktest.html">Mock Tests</a></li>
        <li><a href="neet-dashboard.html" class="active">Dashboard</a></li>
        <li><a href="doubts.html">Doubts</a></li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <h1>📊 NEET Dashboard</h1>
    <p>Track your preparation, predict your score and crack NEET!</p>
  </div>

  <div class="nd-page" id="ndApp">
    <p style="text-align:center;color:#888;padding:40px">Loading your dashboard...</p>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">🧬 Yuvilearn NEET</div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="neet-courses.html">Courses</a>
        <a href="mocktest.html">Mock Tests</a>
        <a href="neet-dashboard.html">Dashboard</a>
      </div>
      <p class="footer-copy">© 2026 Yuvilearn. Built for NEET Aspirants ❤️</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
  const profile     = JSON.parse(localStorage.getItem('yuvi_profile') || '{}');
  const quizHistory = JSON.parse(localStorage.getItem('yuvi_quiz_history') || '[]');
  const targets     = JSON.parse(localStorage.getItem('yuvi_daily_targets') || '{}');
  const today       = new Date().toDateString();

  // NEET date
  const neetDate  = new Date('2026-05-04T08:00:00');
  const daysLeft  = Math.max(0, Math.ceil((neetDate - new Date()) / (1000*60*60*24)));

  // Subject colors
  const subjColors = {
    biology:'#16a34a', physics:'#1e4db7', chemistry:'#d97706',
    science:'#16a34a', english:'#db2777', math:'#1e4db7'
  };

  // Calculate scores per subject
  function getSubjectStats(subj) {
    const tests = quizHistory.filter(q =>
      q.subject?.toLowerCase().includes(subj) ||
      q.chapter?.toLowerCase().includes(subj)
    );
    if(tests.length === 0) return { avg:0, tests:0, best:0 };
    const avg  = Math.round(tests.reduce((a,b)=>a+b.pct,0)/tests.length);
    const best = Math.max(...tests.map(t=>t.pct));
    return { avg, tests:tests.length, best };
  }

  // NEET Score Predictor
  // Biology=90q(360marks), Physics=45q(180marks), Chemistry=45q(180marks) = 720 total
  function predictNEETScore() {
    const bio   = getSubjectStats('biology').avg || getSubjectStats('science').avg;
    const phys  = getSubjectStats('physics').avg;
    const chem  = getSubjectStats('chemistry').avg;
    const bioScore  = Math.round((bio/100) * 360);
    const physScore = Math.round((phys/100) * 180);
    const chemScore = Math.round((chem/100) * 180);
    const total = bioScore + physScore + chemScore;
    return { bio:bioScore, phys:physScore, chem:chemScore, total, bioPct:bio, physPct:phys, chemPct:chem };
  }

  // Rank predictor based on score
  function predictRank(score) {
    if(score >= 700) return { rank:'Under 100', college:'AIIMS Delhi / Top MBBS', color:'#16a34a' };
    if(score >= 680) return { rank:'100–500', college:'AIIMS / Top Govt Medical', color:'#16a34a' };
    if(score >= 650) return { rank:'500–2000', college:'Top Govt Medical Colleges', color:'#16a34a' };
    if(score >= 600) return { rank:'2000–8000', college:'Govt Medical College (State)', color:'#1e4db7' };
    if(score >= 550) return { rank:'8000–25000', college:'State Govt / Private MBBS', color:'#1e4db7' };
    if(score >= 500) return { rank:'25000–60000', college:'Private Medical Colleges', color:'#f59e0b' };
    if(score >= 400) return { rank:'60000–1,50,000', college:'Private MBBS possible', color:'#f59e0b' };
    return { rank:'1,50,000+', college:'Need more preparation', color:'#dc2626' };
  }

  // Daily targets
  const todayTargets = targets[today] || {
    biology: ['Cell Division','Photosynthesis','Human Digestion'],
    physics: ['Laws of Motion','Work & Energy'],
    chemistry: ['Chemical Bonding','Periodic Table']
  };

  // Weak chapters (lowest scoring)
  function getWeakChapters() {
    if(quizHistory.length === 0) return [];
    return [...quizHistory]
      .filter(q => q.pct < 60)
      .sort((a,b) => a.pct - b.pct)
      .slice(0,5);
  }

  // Subject completion counts
  const bioTests   = quizHistory.filter(q=>q.subject?.includes('biology')||q.subject?.includes('science')).length;
  const physTests  = quizHistory.filter(q=>q.subject?.includes('physics')).length;
  const chemTests  = quizHistory.filter(q=>q.subject?.includes('chemistry')).length;
  const totalTests = quizHistory.length;
  const avgScore   = totalTests > 0 ? Math.round(quizHistory.reduce((a,b)=>a+b.pct,0)/totalTests) : 0;
  const predicted  = predictNEETScore();
  const rankInfo   = predictRank(predicted.total);
  const weakChaps  = getWeakChapters();

  // Quiz history HTML
  const quizHTML = quizHistory.length === 0
    ? `<div class="no-data">No tests taken yet.<br/><a href="mocktest.html" style="color:#1e4db7;font-weight:700">Take your first mock test →</a></div>`
    : [...quizHistory].reverse().slice(0,8).map(q => {
        const pass = q.pct >= 75;
        const color = subjColors[q.subject?.toLowerCase()] || '#1e4db7';
        return `<div class="qi">
          <div class="qi-left">
            <div class="qi-dot" style="background:${color}"></div>
            <div>
              <div class="qi-name">${q.chapter||'Mock Test'}</div>
              <div class="qi-date">${q.subject||''} · ${q.date||''}</div>
            </div>
          </div>
          <span class="qi-badge ${pass?'qi-pass':'qi-fail'}">${q.score}/${q.total} (${q.pct}%)</span>
        </div>`;
      }).join('');

  // Weak chapters HTML
  const weakHTML = weakChaps.length === 0
    ? `<div class="no-data">🎉 No weak chapters detected yet!</div>`
    : weakChaps.map(q => `
        <div class="weak-item">
          <span class="weak-icon">⚠️</span>
          <span class="weak-name">${q.chapter||'Chapter'}</span>
          <span class="weak-score">${q.pct}%</span>
          <a href="mocktest.html" class="weak-action">Retry →</a>
        </div>`).join('');

  // Daily target toggle
  function toggleTarget(subj, idx) {
    const key = `target_${today}_${subj}_${idx}`;
    const done = localStorage.getItem(key);
    if(done) localStorage.removeItem(key);
    else localStorage.setItem(key, '1');
    document.getElementById(`check_${subj}_${idx}`).classList.toggle('done');
    updateTargetProgress(subj);
  }

  function updateTargetProgress(subj) {
    const items = todayTargets[subj] || [];
    const done  = items.filter((_,i) => localStorage.getItem(`target_${today}_${subj}_${i}`)).length;
    const pct   = items.length > 0 ? Math.round((done/items.length)*100) : 0;
    const bar   = document.getElementById(`tbar_${subj}`);
    const pctEl = document.getElementById(`tpct_${subj}`);
    if(bar) bar.style.width = pct+'%';
    if(pctEl) pctEl.textContent = `${done}/${items.length} done`;
  }

  // Build target subject HTML
  function buildTargetSubject(subj, label, icon, barClass, items) {
    const itemsHTML = items.map((ch, i) => {
      const done = localStorage.getItem(`target_${today}_${subj}_${i}`);
      return `<div class="target-item">
        <span class="target-ch">${ch}</span>
        <div class="target-check ${done?'done':''}" id="check_${subj}_${i}"
          onclick="toggleTarget('${subj}',${i})">${done?'✓':''}</div>
      </div>`;
    }).join('');
    const done = items.filter((_,i)=>localStorage.getItem(`target_${today}_${subj}_${i}`)).length;
    const pct  = items.length > 0 ? Math.round((done/items.length)*100) : 0;
    return `
      <div class="target-subject">
        <div class="target-subj-name">${icon} ${label}</div>
        ${itemsHTML}
        <div class="target-progress">
          <div class="target-pct"><span>Today's progress</span><span id="tpct_${subj}">${done}/${items.length} done</span></div>
          <div class="target-bar"><div class="target-bar-fill ${barClass}" id="tbar_${subj}" style="width:${pct}%"></div></div>
        </div>
      </div>`;
  }

  // Render
  document.getElementById('ndApp').innerHTML = `

    <!-- Welcome -->
    <div class="nd-welcome">
      <div class="nd-welcome-left">
        <div class="nd-avatar">${profile.avatar||'🧬'}</div>
        <div>
          <div class="nd-name">Hi, ${profile.name||'NEET Aspirant'}! 💪</div>
          <div class="nd-sub">NEET 2026 · Keep pushing every day!</div>
          <div class="nd-sub" style="margin-top:3px;opacity:0.65;font-size:0.8rem">Member since ${profile.joinDate||'today'}</div>
        </div>
      </div>
      <div class="nd-countdown-mini">
        <div class="nd-days" id="daysLeft">${daysLeft}</div>
        <div class="nd-days-lbl">days to NEET 2026</div>
        <div style="font-size:0.72rem;opacity:0.6;margin-top:2px">May 4, 2026</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="nd-stats">
      <div class="nd-stat">
        <div class="nd-stat-val">${totalTests}</div>
        <div class="nd-stat-lbl">Tests Taken</div>
      </div>
      <div class="nd-stat">
        <div class="nd-stat-val">${avgScore}%</div>
        <div class="nd-stat-lbl">Avg Score</div>
      </div>
      <div class="nd-stat">
        <div class="nd-stat-val">${predicted.total}</div>
        <div class="nd-stat-lbl">Predicted Score /720</div>
      </div>
      <div class="nd-stat">
        <div class="nd-stat-val" style="color:${rankInfo.color}">${rankInfo.rank}</div>
        <div class="nd-stat-lbl">Predicted Rank</div>
      </div>
    </div>

    <!-- Score Predictor -->
    <div class="score-predictor">
      <h3>🎯 NEET Score Predictor — Based on Your Mock Tests</h3>
      <div class="predictor-grid">
        <div class="pred-card">
          <div style="font-size:0.85rem;opacity:0.8;margin-bottom:8px">🧬 Biology (90Q)</div>
          <div class="pred-score">${predicted.bio}</div>
          <div class="pred-max">/ 360 marks</div>
          <div class="pred-bar"><div class="pred-bar-fill" style="width:${(predicted.bio/360)*100}%"></div></div>
          <div class="pred-label">${predicted.bioPct}% accuracy</div>
        </div>
        <div class="pred-card">
          <div style="font-size:0.85rem;opacity:0.8;margin-bottom:8px">⚡ Physics (45Q)</div>
          <div class="pred-score">${predicted.phys}</div>
          <div class="pred-max">/ 180 marks</div>
          <div class="pred-bar"><div class="pred-bar-fill" style="width:${(predicted.phys/180)*100}%"></div></div>
          <div class="pred-label">${predicted.physPct}% accuracy</div>
        </div>
        <div class="pred-card">
          <div style="font-size:0.85rem;opacity:0.8;margin-bottom:8px">🧪 Chemistry (45Q)</div>
          <div class="pred-score">${predicted.chem}</div>
          <div class="pred-max">/ 180 marks</div>
          <div class="pred-bar"><div class="pred-bar-fill" style="width:${(predicted.chem/180)*100}%"></div></div>
          <div class="pred-label">${predicted.chemPct}% accuracy</div>
        </div>
      </div>
      <div class="rank-highlight">
        <div style="font-size:0.85rem;opacity:0.8;margin-bottom:6px">🏆 Total Predicted Score</div>
        <div class="rank-val">${predicted.total} / 720</div>
        <div class="rank-lbl">Estimated Rank: <strong>${rankInfo.rank}</strong></div>
        <div class="rank-note">${rankInfo.college}</div>
        <div style="margin-top:12px;font-size:0.78rem;opacity:0.65">
          ⚠️ Prediction based on your mock test performance. Take more tests for accuracy.
        </div>
      </div>
    </div>

    <!-- Daily Target -->
    <div class="target-card">
      <h3>📅 Today's Study Target</h3>
      <div class="target-subtitle">Complete these chapters today — ${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</div>
      <div class="target-grid">
        ${buildTargetSubject('biology','Biology','🧬','bio-bar', todayTargets.biology||['Cell Division','Photosynthesis','Respiration'])}
        ${buildTargetSubject('physics','Physics','⚡','physics-bar', todayTargets.physics||['Laws of Motion','Work & Energy'])}
        ${buildTargetSubject('chemistry','Chemistry','🧪','chem-bar', todayTargets.chemistry||['Chemical Bonding','Mole Concept'])}
      </div>
    </div>

    <!-- Quiz History + Weak Chapters -->
    <div class="nd-grid">
      <div class="nd-card">
        <h3>🧠 Recent Mock Tests</h3>
        <div class="quiz-list">${quizHTML}</div>
        <a href="mocktest.html" style="display:inline-block;margin-top:12px;font-size:0.85rem;color:#1e4db7;font-weight:700">Take new test →</a>
      </div>
      <div class="nd-card">
        <h3>⚠️ Weak Chapters — Need Attention</h3>
        <div class="weak-list">${weakHTML}</div>
        ${weakChaps.length > 0 ? `<p style="font-size:0.78rem;color:#888;margin-top:12px">Focus on these chapters to boost your score!</p>` : ''}
      </div>
    </div>

    <!-- Subject Progress -->
    <div class="nd-card" style="margin-bottom:24px">
      <h3>📈 Subject-wise Test Progress</h3>
      <div class="subj-progress">
        <div class="sp-item">
          <div class="sp-header"><span class="sp-name">🧬 Biology</span><span class="sp-count">${bioTests} tests taken · Avg ${getSubjectStats('biology').avg||getSubjectStats('science').avg}%</span></div>
          <div class="sp-track"><div class="sp-fill" style="width:${Math.min((bioTests/10)*100,100)}%;background:#16a34a"></div></div>
        </div>
        <div class="sp-item">
          <div class="sp-header"><span class="sp-name">⚡ Physics</span><span class="sp-count">${physTests} tests taken · Avg ${getSubjectStats('physics').avg}%</span></div>
          <div class="sp-track"><div class="sp-fill" style="width:${Math.min((physTests/10)*100,100)}%;background:#1e4db7"></div></div>
        </div>
        <div class="sp-item">
          <div class="sp-header"><span class="sp-name">🧪 Chemistry</span><span class="sp-count">${chemTests} tests taken · Avg ${getSubjectStats('chemistry').avg}%</span></div>
          <div class="sp-track"><div class="sp-fill" style="width:${Math.min((chemTests/10)*100,100)}%;background:#d97706"></div></div>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div style="background:linear-gradient(135deg,#0a1628,#1e4db7);border-radius:18px;padding:28px;text-align:center;color:#fff;margin-bottom:24px">
      <h3 style="font-size:1.1rem;font-weight:800;margin-bottom:8px">🚀 Ready to improve your score?</h3>
      <p style="opacity:0.85;font-size:0.9rem;margin-bottom:18px">Take a mock test now and watch your predicted score go up!</p>
      <a href="mocktest.html" style="background:#fff;color:#1e4db7;padding:12px 28px;border-radius:50px;font-weight:800;text-decoration:none;display:inline-block">📝 Start Mock Test Now</a>
    </div>`;
  </script>
</body>
</html>
