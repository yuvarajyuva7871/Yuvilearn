<!DOCTYPE html>
<html>
<head>
  <title>Courses</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 p-8 text-center">

<h1 class="text-3xl font-bold">Your Course</h1>

<div id="courseContainer" class="mt-8"></div>

<a href="https://t.me/Yuvilearn"
   class="inline-block mt-8 px-6 py-2 bg-green-500 text-white rounded-lg">
   Talk to Mentor
</a>

<script>
  // Get class from URL
  const params = new URLSearchParams(window.location.search);
  const userClass = params.get("class");

  const container = document.getElementById("courseContainer");

  // Course Data
  const courses = {
    "11": {
      title: "Class 11 NEET Physics",
      desc: "Build strong fundamentals for NEET",
    },
    "12": {
      title: "Class 12 NEET Physics",
      desc: "Board + NEET focused preparation",
    },
    "dropper": {
      title: "Dropper NEET Physics",
      desc: "Full revision + PYQs + strategy",
    }
  };

  // Show course
  if (courses[userClass]) {
    container.innerHTML = `
      <div class="bg-white p-6 rounded-xl shadow max-w-md mx-auto">
        <h2 class="text-xl font-semibold">${courses[userClass].title}</h2>
        <p class="text-gray-600 mt-2">${courses[userClass].desc}</p>

        <button class="mt-4 px-4 py-2 bg-violet-600 text-white rounded">
          Enroll Now
        </button>
      </div>
    `;
  } else {
    container.innerHTML = `
      <p class="text-red-500">Invalid selection. Please go back.</p>
    `;
  }
</script>

</body>
</html>
